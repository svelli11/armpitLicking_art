<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noelles art</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body id="root">
    <header id="headerContainer">
        <div id="header">
            <span>noelle's art</span>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <img class="divider" src="assets/widgets/firedivider.gif">
        </div>
    </header>
    <div id="bg"></div>
    <div id="ad1" class="realAd">
        <a href="https://www.counter-strike.net/cs2" id="cs2" class="sideLink"></a>
        <a href="https://discord.com/users/1131423380923494460" id="discord" class="sideLink"></a>
    </div>
    <div id="ad2Container">
        <div id="ad2" class="realAd">
            <a href="https://osu.ppy.sh/home/download" id="osu" class="sideLink"></a>
            <a href="https://osu.ppy.sh/teams/21507" id="iwantyou" class="sideLink"></a>
            <a href="https://osu.ppy.sh/teams/21507" id="artAd" class="sideLink"></a> <!-- maybe replace with latest youtube or artpiece IDFK -->
        </div>
    </div>
    <div id="contentContainer">
        <div id="main">
            <div class="noise-texture"></div>
            <div class="artContainer">
                <img class="art"src="assets/art/kochiya_cute.png"/>
            </div>
            <div class="artContainer">
                <img class="art"src="assets/art/mona_birthday.jpg"/>
            </div>
            <div class="artContainer">
                <img class="art"src="assets/art/okiri_dokiri.jpg"/>
            </div>
            <div class="artContainer">
                <img class="art"src="assets/art/b805760bb9b13cdde3d754e2d9975478.jpg"/>
            </div>
            <!-- <div>Item 1</div> -->
        </div>
    </div>
    <button id="toggleAd" onclick="changeImage();toggleAds();">
        <img src="assets/widgets/disable_ads.gif" id="toggleAdImg">
    </button>
    <svg width="0" height="0" style="position: absolute;">
        <filter id="noise-texture">
            <feTurbulence 
                type="fractalNoise" 
                baseFrequency="0.65" 
                numOctaves="4" 
                seed="0"
                stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/>
            <feComponentTransfer>
                <feFuncA type="discrete" tableValues="0 0.03"/>
            </feComponentTransfer>
            <feBlend mode="multiply" in="SourceGraphic"/>
        </filter>
    </svg>
    <script src="assets/script.js"></script>
</body>
</html>
