<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>noelles art</title>
    <link rel="icon" type="image/x-icon" href="https://i.ibb.co/yW7XTQx/sword.png">
    <link rel="stylesheet" href="assets/style.css">
    <link href="assets/landscape.css" rel="stylesheet" media="(min-width: 1720px)" />
</head>

<body id="root">
    <div id="bg"></div> 
    <header id="headerContainer">
        <div id="header">
            <span>noelle's art</span>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <img class="divider" src="assets/widgets/firedivider.gif">
        </div>
    </header>


    <div id="fake1" class="realFake">
        <a href="https://www.counter-strike.net/cs2" id="cs2" class="sideLink"></a>
        <a href="https://discord.com/users/1131423380923494460" id="discord" class="sideLink"></a>
    </div>
    <div id="fake2Container">
        <div id="fake2" class="realFake">
            <a href="https://osu.ppy.sh/home/download" id="osu" class="sideLink"></a>
            <a href="https://osu.ppy.sh/teams/21507" id="iwantyou" class="sideLink"></a>
            <a href="https://osu.ppy.sh/teams/21507" id="artFake" class="sideLink"></a> <!-- maybe replace with latest youtube or artpiece IDFK -->
        </div>
    </div>

    <div id="contentContainer">
        <div id="main">
            <div class="noise-texture"></div>
            <div class="artContainer">
                <img class="art"src="assets/art/png-kochiya_cute-thumb.webp" onclick="openImage(this)"/>
            </div>
            <div class="artContainer">
                <img class="art"src="assets/art/mona_birthday-thumb.webp" onclick="openImage(this)"/>
            </div>
            <div class="artContainer">
                <img class="art"src="assets/art/okiri_dokiri-thumb.webp" onclick="openImage(this)"/>
            </div>
            <div class="artContainer">
                <img class="art"src="assets/art/b805760bb9b13cdde3d754e2d9975478-thumb.webp" onclick="openImage(this)"/>
            </div>
        </div>
    </div>
    <!-- footer with  sources, such as https://pixeliconlibrary.com/ -->
    <button id="toggleAd" onclick="swapAdBlockWidget();toggleAds();">
        <img src="assets/widgets/disable_ads.gif" id="toggleAdImg">
    </button>

    <template id="viewTemplate">
        <div id="artViewer">
            <img src="" alt="" id="artpiece">
            <div id="artDescription"></div>
            <div id="viewExit" class="viewButton noise-texture" onclick="closeArtViewer()">
                <img src="assets/widgets/window-close-solid.svg" alt="" class="viewButtonWidget" style="height: 50%;">
            </div>
            <div id="viewButtonContainer">
                <div id="viewLeft" class="viewButton noise-texture" onclick="changeArtImage(1)">
                    <img src="assets/widgets/angle-left-solid.svg" alt="" class="viewButtonWidget">
                </div>
                <div id="viewRight" class="viewButton noise-texture" onclick="changeArtImage(2)">
                    <img src="assets/widgets/angle-right-solid.svg" alt="" class="viewButtonWidget">
                </div>
            </div>
        </div>
    </template>

    <svg width="0" height="0" style="position: absolute;">
        <filter id="noise-texture">
            <feTurbulence 
                type="fractalNoise" 
                baseFrequency="0.65"
                numOctaves="4" 
                seed="0"
                stitchTiles="stitch"/>
            <feColorMatrix type="saturate" values="0"/>
            <feComponentTransfer>
                <feFuncA type="discrete" tableValues="0 0.03"/>
            </feComponentTransfer>
            <feBlend mode="multiply" in="SourceGraphic"/>
        </filter>
    </svg>
    <script src="assets/script.js" ></script>
    <script type="module">
        // A function to get data from a URL
        async function getData(url) {
            const x = await fetch(url)  // We wait for the data to arrive
            return await x.json()  // We wait for the data to convert to JSON
        }

        // We wait for the data to arrive
        const data = await getData("assets/art/thumbnails.json")

        // We log/print the arrived JSON data
        console.log(data)
    </script>
</body>
</html>
